name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Sync locked development environment
        run: uv sync --frozen
      - name: Unit and API tests
        run: uv run --frozen pytest -q
      - name: Static type checks
        run: uv run --frozen mypy asr_server tests scripts
